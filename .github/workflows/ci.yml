name: CI

on:
  pull_request:
    paths:
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - "packages/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/**"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
