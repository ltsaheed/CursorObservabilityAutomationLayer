name: Instrument Reusable

on:
  workflow_call:
    inputs:
      tooling-repo:
        description: GitHub slug of the Instrument tooling repo (owner/name)
        required: true
        type: string
      tooling-ref:
        description: Branch, tag, or SHA of the tooling repo to use
        required: false
        type: string
        default: main
      workspace-root:
        description: Path to the app workspace root (relative to caller repo checkout)
        required: false
        type: string
        default: .
      config-path:
        description: Path to instrument.config.json (relative to workspace-root)
        required: false
        type: string
        default: instrument.config.json
      dry-run:
        description: Simulate agents and Mixpanel deploy
        required: false
        type: boolean
        default: false
      reports-only:
        description: Skip Mixpanel deployment
        required: false
        type: boolean
        default: false
      skip-code-agent:
        description: Skip cloud code agent phase
        required: false
        type: boolean
        default: false
    secrets:
      CURSOR_API_KEY:
        required: false
      MIXPANEL_SERVICE_ACCOUNT_USERNAME:
        required: false
      MIXPANEL_SERVICE_ACCOUNT_SECRET:
        required: false
      MIXPANEL_PROJECT_ID:
        required: false
      MIXPANEL_WORKSPACE_ID:
        required: false
      MIXPANEL_DASHBOARD_ID:
        required: false

jobs:
  instrument:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout app
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Instrument tooling
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.tooling-repo }}
          ref: ${{ inputs.tooling-ref }}
          path: .instrument/tooling

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: .instrument/tooling/package-lock.json

      - name: Install ripgrep for Cursor SDK local agents
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install and build tooling
        working-directory: .instrument/tooling
        run: npm ci && npm run build

      - name: Collect changed files
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          mapfile -t FILES < <(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          WORKSPACE="${{ inputs.workspace-root }}"
          if [ ${#FILES[@]} -eq 0 ]; then
            echo "files=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo "files<<EOF"
            for file in "${FILES[@]}"; do
              if [[ "$file" == .instrument/* ]]; then
                continue
              fi
              if [ "$WORKSPACE" = "." ]; then
                printf '%s\n' "$file"
                continue
              fi
              if [[ "$file" == "$WORKSPACE"/* ]]; then
                printf '%s\n' "${file#"$WORKSPACE"/}"
              fi
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Configure Instrument CLI
        id: instrument-cli
        run: |
          WORKSPACE="${{ github.workspace }}/${{ inputs.workspace-root }}"
          CONFIG="${{ inputs.config-path }}"
          if [[ "$CONFIG" != /* ]]; then
            CONFIG="$WORKSPACE/$CONFIG"
          fi
          {
            echo "WORKSPACE=$WORKSPACE"
            echo "CONFIG=$CONFIG"
            echo "COMMON_ARGS<<EOF"
            printf '%s\n' \
              --config "$CONFIG" \
              --workspace-root "$WORKSPACE" \
              --repo "${{ github.repository }}" \
              --pr-number "${{ github.event.pull_request.number }}" \
              --pr-url "${{ github.event.pull_request.html_url }}"
            if [ "${{ inputs.dry-run }}" = "true" ]; then
              printf '%s\n' --dry-run
            fi
            if [ "${{ inputs.reports-only }}" = "true" ]; then
              printf '%s\n' --reports-only
            fi
            if [ "${{ inputs.skip-code-agent }}" = "true" ]; then
              printf '%s\n' --skip-code-agent
            fi
            if [ -n "${{ steps.changed.outputs.files }}" ]; then
              while IFS= read -r file; do
                [ -n "$file" ] && printf '%s\n' --changed-files "$file"
              done <<< "${{ steps.changed.outputs.files }}"
            fi
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Pre-scan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd .instrument/tooling
          mapfile -t ARGS <<< "$COMMON_ARGS"
          npm run instrument -- pre-scan "${ARGS[@]}"

      - name: Code Agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd .instrument/tooling
          mapfile -t ARGS <<< "$COMMON_ARGS"
          npm run instrument -- code-agent "${ARGS[@]}"

      - name: Sync workspace with Code Agent commits
        if: ${{ inputs.skip-code-agent != true && inputs.dry-run != true && github.event_name == 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          HEAD_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          git fetch "https://x-access-token:${GITHUB_TOKEN}@github.com/${HEAD_REPO}.git" "${HEAD_REF}"
          git reset --hard FETCH_HEAD

      - name: Standards review
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd .instrument/tooling
          mapfile -t ARGS <<< "$COMMON_ARGS"
          npm run instrument -- review "${ARGS[@]}"

      - name: Dashboard agent
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd .instrument/tooling
          mapfile -t ARGS <<< "$COMMON_ARGS"
          npm run instrument -- dashboard "${ARGS[@]}"

      - name: Mixpanel deploy
        env:
          MIXPANEL_SERVICE_ACCOUNT_USERNAME: ${{ secrets.MIXPANEL_SERVICE_ACCOUNT_USERNAME }}
          MIXPANEL_SERVICE_ACCOUNT_SECRET: ${{ secrets.MIXPANEL_SERVICE_ACCOUNT_SECRET }}
          MIXPANEL_PROJECT_ID: ${{ secrets.MIXPANEL_PROJECT_ID }}
          MIXPANEL_WORKSPACE_ID: ${{ secrets.MIXPANEL_WORKSPACE_ID }}
          MIXPANEL_DASHBOARD_ID: ${{ secrets.MIXPANEL_DASHBOARD_ID }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd .instrument/tooling
          mapfile -t ARGS <<< "$COMMON_ARGS"
          npm run instrument -- deploy "${ARGS[@]}"

      - name: Sync PR comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          cd .instrument/tooling
          mapfile -t ARGS <<< "$COMMON_ARGS"
          npm run instrument -- comment "${ARGS[@]}"

      - name: Upload pipeline state artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrument-pipeline-state
          path: ${{ inputs.workspace-root == '.' && '.' || inputs.workspace-root }}/.instrument/state/
          if-no-files-found: ignore
